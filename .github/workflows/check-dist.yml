# In TypeScript actions, `dist/index.js` is a special file. When you reference
# an action with `uses:`, `dist/index.js` is the code that will be run. For this
# project, the `dist/index.js` file is generated from other source files through
# the build process. We need to make sure that the checked-in `dist/index.js`
# file matches what is expected from the build.
#
# This workflow will rebuild the dist/ directory and push updates back to the
# branch if needed. It uses pull_request_target to ensure the workflow always
# runs from main, preventing malicious PRs from modifying the build process.
name: Check dist/

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request_target:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions: {}

jobs:
  check-dist:
    name: Check dist/
    runs-on: ubuntu-latest

    permissions:
      contents: write
      statuses: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install Dependencies
        id: install
        run: pnpm install

      - name: Build dist/ Directory
        id: build
        run: pnpm run bundle

      - name: Generate Coverage Badge
        id: badge
        run: |
          pnpm run ci-test || true
          npx make-coverage-badge --output-path ./dist/coverage.svg

      - name: Check for dist/ Changes
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push dist/ Updates
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request_target'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -s -m "chore: rebuild dist/"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Fail if dist/ is Out of Date
        if: steps.diff.outputs.changed == 'true' && github.event_name != 'pull_request_target'
        run: |
          echo "Detected uncommitted changes after build. See status below:"
          git diff --ignore-space-at-eol --text dist/
          exit 1

      # If dist/ was different than expected, upload the expected version as
      # a workflow artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.diff.outputs.changed == 'true' }}
        with:
          name: dist
          path: dist/
